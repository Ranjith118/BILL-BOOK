services:
  - type: web
    name: billbook
    runtime: python
    rootDir: .
    buildCommand: pip uninstall -y psycopg2 psycopg2-binary || true && pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: BILLBOOK_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: billbook-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URL
        sync: false
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.2"

databases:
  - name: billbook-db
    databaseName: billbook
    user: billbook
    plan: free
