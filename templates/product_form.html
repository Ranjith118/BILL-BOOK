{% extends 'base.html' %}
{% block title %}- {{ 'Edit' if product else 'Add' }} Product{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white fw-bold border-0 pt-4 ps-4">
        <i class="bi bi-box-seam me-2 text-warning"></i>{{ 'Edit' if product else 'Add' }} Product
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Product Name <span class="text-danger">*</span></label>
              <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Category</label>
              <input type="text" name="category" class="form-control" value="{{ product.category if product else '' }}"/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Price (Rs.) <span class="text-danger">*</span></label>
              <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price if product else '' }}" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Stock Quantity</label>
              <input type="number" name="stock" class="form-control" value="{{ product.stock if product else 0 }}"/>
            </div>
            <div class="col-md-6">
              <label class="form-label">GST %</label>
              <input type="number" step="0.01" name="gst" class="form-control" value="{{ product.gst if product else 0 }}"/>
            </div>
            <div class="col-12">
              <label class="form-label">Barcode</label>
              <input type="text" name="barcode" class="form-control" value="{{ product.barcode if product else '' }}" placeholder="Optional"/>
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea name="description" class="form-control" rows="2">{{ product.description if product else '' }}</textarea>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-warning text-dark">
              <i class="bi bi-check-lg me-1"></i>{{ 'Update' if product else 'Add' }} Product
            </button>
            <a href="{{ url_for('products') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
