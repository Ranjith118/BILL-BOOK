<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BillBook - Business Setup</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display:flex; align-items:center; padding: 40px 0; }
    .card { border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .step-badge { background: #e94560; color: white; border-radius: 50%; width: 32px; height: 32px; display:inline-flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.9rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-sm-11">
      <div class="card border-0">
        <div class="card-body p-5">

          <!-- Progress indicator -->
          <div class="d-flex align-items-center gap-3 mb-4">
            <span class="step-badge">✓</span>
            <div class="flex-grow-1 border-top border-2"></div>
            <span class="step-badge">2</span>
            <div class="flex-grow-1 border-top border-2 opacity-25"></div>
            <span class="step-badge opacity-25">3</span>
          </div>
          <div class="d-flex justify-content-between mb-4">
            <small class="text-muted">Account Created</small>
            <small class="fw-semibold text-danger">Business Setup</small>
            <small class="text-muted">Dashboard</small>
          </div>

          <div class="text-center mb-4">
            <i class="bi bi-building fs-1 text-danger"></i>
            <h4 class="fw-bold mt-2">Set Up Your Business</h4>
            <p class="text-muted small">This information will appear on all your invoices.</p>
          </div>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
              <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
            {% endfor %}
          {% endwith %}

          <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
              <label class="form-label fw-semibold">Business Name <span class="text-danger">*</span></label>
              <input type="text" name="name" class="form-control" placeholder="e.g. Ranjith Stores" required autofocus/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Address</label>
              <textarea name="address" class="form-control" rows="2" placeholder="Shop address..."></textarea>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Phone Number</label>
                <input type="text" name="phone" class="form-control" placeholder="e.g. 9876543210"/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control" placeholder="business@email.com"/>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">GST Number</label>
              <input type="text" name="gst_number" class="form-control" placeholder="e.g. 29ABCDE1234F1Z5"/>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Business Logo <span class="text-muted small">(optional)</span></label>
              <input type="file" name="logo" class="form-control" accept="image/*"/>
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold py-2">
              <i class="bi bi-arrow-right-circle me-2"></i>Save & Go to Dashboard
            </button>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
