{% extends 'base.html' %}
{% block title %}- Add User{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white fw-bold border-0 pt-4 ps-4">
        <i class="bi bi-person-plus me-2 text-secondary"></i>Add User
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Username <span class="text-danger">*</span></label>
            <input type="text" name="username" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Password <span class="text-danger">*</span></label>
            <input type="password" name="password" class="form-control" required/>
          </div>
          <div class="mb-4">
            <label class="form-label">Role</label>
            <select name="role" class="form-select">
              <option value="cashier">Cashier</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-secondary">
              <i class="bi bi-check-lg me-1"></i>Add User
            </button>
            <a href="{{ url_for('users') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
