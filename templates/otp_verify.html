<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BillBook - Verify OTP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height:100vh; display:flex; align-items:center; }
    .card { border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
    .otp-input { letter-spacing: 0.5em; font-size: 1.8rem; text-align: center; font-weight: bold; }
    .brand-icon { font-size:3rem; color:#e94560; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4 col-sm-10">
      <div class="card border-0">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="bi bi-shield-lock brand-icon"></i>
            <h4 class="fw-bold mt-2">Enter OTP</h4>
            <p class="text-muted small">
              A 6-digit code was sent to<br/>
              <strong>{{ contact }}</strong>
            </p>
          </div>
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
              <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
            {% endfor %}
          {% endwith %}

          <form method="POST" action="{{ '/register/verify-otp' if purpose == 'register' else '/register/password/verify-otp' if purpose == 'pwd_register' else '/login/verify-otp' }}">
            <input type="hidden" name="contact" value="{{ contact }}"/>
            <div class="mb-4">
              <input type="text" name="otp" class="form-control otp-input"
                     maxlength="6" placeholder="------" required autofocus
                     inputmode="numeric" autocomplete="one-time-code"/>
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold py-2">
              <i class="bi bi-check-circle me-2"></i>Verify OTP
            </button>
          </form>

          <!-- Resend -->
          <div class="text-center mt-3">
            <span class="text-muted small">Didn't receive it? </span>
            <a href="{{ '/register/password' if purpose == 'pwd_register' else '/register' if purpose == 'register' else '/login' }}" class="small">Resend OTP</a>
          </div>

          <!-- Dev hint — remove in production -->
          <div class="alert alert-warning mt-3 py-2 small text-center">
            <i class="bi bi-info-circle me-1"></i>
            No SMS/email configured? Check your <strong>terminal</strong> for the OTP.
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
