{% extends 'base.html' %}
{% block title %}- {{ 'Edit' if customer else 'Add' }} Customer{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white fw-bold border-0 pt-4 ps-4">
        <i class="bi bi-person-plus me-2 text-success"></i>{{ 'Edit' if customer else 'Add' }} Customer
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ customer.name if customer else '' }}" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ customer.phone if customer else '' }}"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{ customer.email if customer else '' }}"/>
          </div>
          <div class="mb-4">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-control" rows="2">{{ customer.address if customer else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-check-lg me-1"></i>{{ 'Update' if customer else 'Add' }} Customer
            </button>
            <a href="{{ url_for('customers') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
