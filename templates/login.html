<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BillBook - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height:100vh; display:flex; align-items:center; }
    .card { border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
    .brand-icon { font-size:3rem; color:#e94560; }
    .divider { display:flex; align-items:center; gap:10px; color:#aaa; font-size:0.85rem; }
    .divider::before, .divider::after { content:''; flex:1; border-top:1px solid #ddd; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4 col-sm-10">
      <div class="card border-0">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="bi bi-receipt-cutoff brand-icon"></i>
            <h3 class="fw-bold mt-2">BillBook</h3>
            <p class="text-muted small">Billing Management System</p>
          </div>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
              <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
            {% endfor %}
          {% endwith %}

          <form method="POST">
            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control"
                       placeholder="you@email.com" required autofocus/>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control"
                       placeholder="Your password" required/>
              </div>
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold py-2">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
          </form>

          <div class="divider my-4">OR</div>

          <a href="/auth/google" class="btn btn-outline-dark w-100 fw-semibold py-2">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" class="me-2"/>
            Continue with Google
          </a>

          <p class="text-center text-muted small mt-4 mb-0">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
